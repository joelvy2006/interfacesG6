{% extends 'base.html' %}
{% block title %}Eliminar categoría | Anthonela Farms{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h4 class="mb-3">Eliminar categoría</h4>
        <p>¿Seguro que deseas eliminar la categoría <strong>{{ categoria.nombre_cat }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'listar_categorias' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
