{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anthonela Farms admin dashboard">
    <title>{% block title %}Anthonela Farms{% endblock %}</title>
    <link rel="icon" href="{% static 'public/images/favicon/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'public/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'public/vendors/bootstrap-icons/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'public/css/style.css' %}">
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 22%),
                linear-gradient(180deg, #ecf7ed 0%, #d8eed8 48%, #f2fbf3 100%);
            color: #16331f;
        }

        .admin-shell {
            min-height: 100vh;
        }

        .sidebar-header {
            background: rgba(245, 253, 246, 0.96);
        }

        .sidebar-nav .nav-link {
            color: #1f4d2d;
        }

        .sidebar-nav .nav-link.active,
        .sidebar-nav .nav-link:hover {
            color: #10502f;
            background: rgba(34, 197, 94, 0.10);
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div class="sidebar-backdrop" data-sidebar-close></div>
        {% include 'header.html' %}
        <div class="admin-main">
            <main class="dashboard-content">
                <div class="container-fluid px-3 px-lg-4 py-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
            {% include 'footer.html' %}
        </div>
    </div>
    <script src="{% static 'public/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'public/js/main.js' %}"></script>
</body>
</html>
