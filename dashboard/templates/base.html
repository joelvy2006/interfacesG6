{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anthonela Farms admin dashboard">
    <title>{% block title %}Anthonela Farms{% endblock %}</title>
    <link rel="icon" href="{% static 'public/images/favicon/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'public/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'public/vendors/bootstrap-icons/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'public/css/style.css' %}">
    <style>
        body {
            background: #0b1210;
            color: #e7f5e9;
        }

        .admin-shell {
            min-height: 100vh;
        }

        .admin-navbar.bg-white,
        .admin-footer.bg-white,
        .card,
        .card-header,
        .card-body,
        .table,
        .table-responsive,
        .table-hover tbody tr,
        .alert,
        .form-control,
        .form-select,
        .input-group-text.bg-white,
        .bg-white,
        .bg-light,
        .table-light,
        .sidebar-toggle,
        .icon-button,
        .profile-button {
            background-color: #0f2515 !important;
            border-color: #183b26 !important;
            color: #e7f5e9 !important;
        }

        .bg-white/90 {
            background-color: rgba(15, 37, 21, 0.85) !important;
        }

        .page-icon,
        .section-title i {
            background: #143f25 !important;
            color: #d6fae7 !important;
        }

        .form-control::placeholder,
        .form-select::placeholder,
        .text-muted {
            color: #9bb19e !important;
        }

        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus,
        .icon-button:hover,
        .icon-button:focus,
        .profile-button:hover,
        .profile-button:focus,
        .sidebar-toggle:hover,
        .sidebar-toggle:focus {
            background: #143f25 !important;
            color: #e7f5e9 !important;
            border-color: #22c55e !important;
        }

        .badge.bg-success,
        .badge.bg-success-subtle,
        .badge.bg-secondary,
        .badge.bg-secondary-subtle {
            background-color: #184724 !important;
            color: #d1fae5 !important;
        }

        .badge.bg-success {
            background-color: #16a34a !important;
        }

        .table thead th {
            color: #cbd5e1 !important;
        }

        .table tbody td {
            color: #e7f5e9 !important;
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <div class="sidebar-backdrop" data-sidebar-close></div>
        {% include 'header.html' %}
        <div class="admin-main">
            <main class="dashboard-content">
                <div class="container-fluid px-3 px-lg-4 py-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
            {% include 'footer.html' %}
        </div>
    </div>
    <script src="{% static 'public/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'public/js/main.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                document.querySelectorAll('.alert').forEach(function (alert) {
                    if (typeof bootstrap !== 'undefined' && bootstrap.Alert) {
                        new bootstrap.Alert(alert).close();
                    } else if (alert.parentNode) {
                        alert.parentNode.removeChild(alert);
                    }
                });
            }, 4000);
        });
    </script>
</body>
</html>
